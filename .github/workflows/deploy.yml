name: Deploy to EC2

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e  # Exit immediately on any error

            cd ~/PapersAI_platform

            echo "Pulling latest changes..."
            git pull origin main || git pull origin master

            echo "Building new Docker images..."
            docker compose build  # Build BEFORE taking down — minimizes downtime

            echo "Applying database migrations..."
            docker compose run --rm backend python manage.py migrate --noinput

            echo "Restarting containers with new images..."
            docker compose up -d --remove-orphans  # remove-orphans cleans up stale containers

            echo "Waiting for containers to stabilize..."
            sleep 5

            echo "Verifying containers are running..."
            docker compose ps | grep -E "(backend|frontend)" | grep -v "Exit" || {
              echo "ERROR: One or more containers failed to start!"
              docker compose logs --tail=50
              exit 1
            }

            echo "Cleaning up dangling images..."           
            docker image prune -f  # -f only, NOT -af — keeps recent unused images for potential rollback

            echo "Deployment completed successfully!"